<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hydra - Live</title>
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrAumzVZCmAbZ8rZNGsLBy8sb46s3yA8KGn/sFm6V2VyT" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/hydra.css">
</head>
<body class="theme-dark">
  <main class="container">
    <header class="row between">
      <h1>Hydra - live</h1>
      <form method="post" action="/finalize" class="inline">
        <button type="submit">Finalize</button>
      </form>
    </header>

    <section id="banners" aria-label="Banners"></section>

    <section id="ask">
      <h2>Ask</h2>
      <form id="ask-form" method="post" action="/ask">
        <input type="text" name="topic" required placeholder="Ask a research question">
        <button type="submit">Send</button>
      </form>
    </section>

    <section id="questions">
      <h2>Questions</h2>
      <ul id="question-list">
        {% for q in questions %}
        <li id="q-{{ q.q_id }}" class="question status-{{ q.status }}">
          <div class="q-topic">{{ q.topic }}</div>
          <div class="q-meta muted">{{ q.q_id }} - {{ q.status }} - source: {{ q.source }}</div>
          {% if q.rationale %}
          <div class="q-rationale">{{ q.rationale }}</div>
          {% endif %}
          <div class="q-actions">
            {% if q.status == "suggested" %}
            <form method="post" action="/promote/{{ q.q_id }}" class="inline">
              <button type="submit">Promote</button>
            </form>
            {% endif %}
            <form method="post" action="/dismiss/{{ q.q_id }}" class="inline">
              <button type="submit">Dismiss</button>
            </form>
            <form method="post" action="/edit/{{ q.q_id }}" class="inline edit-form">
              <input type="text" name="notes" placeholder="Notes">
              <button type="submit">Save</button>
            </form>
          </div>
        </li>
        {% endfor %}
      </ul>
    </section>
  </main>
  <script src="/static/hydra.js" defer></script>
</body>
</html>
